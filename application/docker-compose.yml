version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trgaming_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - trgaming

  nginx:
    image: nginx:stable-alpine
    container_name: trgaming_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - trgaming

  db:
    image: mysql:5.7
    container_name: trgaming_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-trgaming}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-trgaming}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - trgaming

networks:
  trgaming:
    driver: bridge

volumes:
  dbdata:
    driver: local
